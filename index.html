<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Rating - One Rating Per Game Per Device</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 2rem 0; }
        .game-card {
            transition: all 0.2s ease-in-out;
            border: 1px solid #dee2e6;
            height: 100%;
            background: white;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .game-icon {
            width: 100%;
            height: 120px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .folder-path {
            font-family: monospace;
            font-size: 0.7rem;
            color: #6c757d;
            background: #f8f9fa;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
        }
        .avg-display {
            font-size: 0.7rem;
            color: #856404;
            background: #fff3cd;
            border-radius: 4px;
            padding: 2px 6px;
            margin-top: 4px;
            display: inline-block;
        }
        .rated-badge {
            font-size: 0.65rem;
            color: #155724;
            background: #d4edda;
            border-radius: 4px;
            padding: 2px 6px;
            margin-top: 4px;
            display: inline-block;
        }
        .star-rating {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 5px 0;
        }
        .star {
            font-size: 1.3rem;
            cursor: pointer;
            color: #dee2e6;
            transition: color 0.1s;
        }
        .star:hover, .star.active { color: #ffc107; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 440px;
            margin: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .toast-msg {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #198754;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            z-index: 99999;
            display: none;
        }
        .toast-msg.show { display: block; }
        .info-banner {
            background: #cfe2ff;
            border: 1px solid #9ec5fe;
            color: #084298;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }
        .btn-rate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="info-banner">
        🔒 <strong>One rating per game per computer.</strong> Rate each game once. Rate different games as many as you want!
    </div>
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>🎮 Submitted Games</h5>
        <span class="badge bg-primary" id="gameCount">0</span>
    </div>
    
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="gameGrid">
        <div class="col"><div class="alert alert-info text-center">Loading games...</div></div>
    </div>
</div>

<div class="footer text-center mt-5 py-4 bg-white border-top">
    <p class="mb-0">Play · Rate Once Per Game · Be kind</p>
</div>

<!-- Rating Modal -->
<div class="modal-overlay" id="ratingModal">
    <div class="modal-box">
        <h5 id="modalGameName"></h5>
        <p class="text-muted small">Rate 1-5 stars (you can only rate this game once)</p>
        <div class="mb-3">
            <label>Fun factor</label>
            <div class="star-rating" data-category="fun"></div>
        </div>
        <div class="mb-3">
            <label>Creativity</label>
            <div class="star-rating" data-category="creativity"></div>
        </div>
        <div class="mb-3">
            <label>Difficulty / Balance</label>
            <div class="star-rating" data-category="difficulty"></div>
        </div>
        <div class="mb-3">
            <label>Overall polish</label>
            <div class="star-rating" data-category="polish"></div>
        </div>
        <div class="mb-3">
            <label>Comment (optional)</label>
            <textarea id="commentBox" class="form-control" rows="2" placeholder="What did you like? Any bugs?"></textarea>
        </div>
        <div class="d-flex gap-2 justify-content-end">
            <button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary btn-sm" id="submitBtn" onclick="submitRating()" disabled>Submit</button>
        </div>
    </div>
</div>

<div class="toast-msg" id="toast">✓ Rating saved!</div>

<script>
const SUPABASE_URL = 'https://ckvyqutltebnamvoyzrc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_GiVb88ghATn8_0PLqEAasw_Vhf13eTD';

const games = [
    { name:"Pokemon Game", folder:"Pokemon", github:"https://makb0925.github.io/Pokemon_Game" },
    { name:"Stockle", folder:"Stockle", github:"https://sebbra26-creator.github.io/STOCKLE" },
    { name:"Dolphin Pop", folder:"DolphinPop", github:"https://clajoo27.github.io/Dolphin-Pop/" },
    { name:"Car Race", folder:"CarRace", github:"https://tyler-bergman.github.io/Final-Project/" },
    { name:"BasketBall Game", folder:"Basketball", github:"https://yurihan08.github.io/BasketballGame/" },
    { name:"Maze Run", folder:"MazeGame", github:"https://serenego127.github.io/mazeRun/" },
    { name:"Human Benchmark", folder:"HumanBenchmark", github:"https://thejeo27.github.io/HumanBenchmark/" },
    { name:"Doodle Jump", folder:"DoodleJump", github:"https://george123-cloud.github.io/DoodleJump/" },
    { name:"Cannon BBall", folder:"CannonBall", github:"https://jalen-hall.github.io/CannonBBALL/" },
    { name:"Ravenous Randy", folder:"RavenousRandy", github:"https://shinwin124.github.io/GameForCompSci/" },
    { name:"Super Striker", folder:"SuperStriker", github:"https://miguelyangel515-svg.github.io/Super-Striker-game/" },
    { name:"Marathon Race", folder:"MarathonRace", github:"https://nickyawesome821.github.io/Marathon-game/" },
    { name:"Brick Game", folder:"BrickGame", github:"https://deabiba1.github.io/spacegame/" },
    { name:"Block Break", folder:"BlockBreak", github:"https://amir-suckra.github.io/BlockBreak/" },
    { name:"PokeBerry Catcher", folder:"PokeBerryCatcher", github:"https://timisverycool-ui.github.io/BerryCatcher/" },
    { name:"Jelly Fish", folder:"JellyFish", github:"https://sallyrubin724.github.io/SpongebobGame/" },
    { name:"Music Notes", folder:"MusicNotes", github:"https://nicholasrozenblit-wq.github.io/siteReading/" },
    { name:"Zombie Run", folder:"ZombieRun", github:"https://jacyag125.github.io/Zombie-Run/" },
    { name:"Charging Chaos", folder:"ChargingChaos", github:"https://gurvinder1027.github.io/ChargerChaos/" },
    { name:"Yahtzee", folder:"Yahtzee", github:"https://gianna-lobue.github.io/Yahtzee-/" },
    { name:"Surfing Game", folder:"SurfingGame", github:"https://dylanjhub.github.io/Surf-Rider/" },
    { name:"Santa Game", folder:"SantaGame", github:"https://jamgil27-glitch.github.io/Santa-Game/" },
    { name:"Mewtwo Survival", folder:"MewtwoSurvival", github:"https://andrewhockey65-pixel.github.io/MewtwoSurvival/" }
];

let activeGame = null;
let currentRatings = {};
let ratingsCache = {};
let userRatedGames = new Set(); // Tracks which games THIS device rated

// Get unique device ID (stored in browser localStorage)
function getDeviceId() {
    let deviceId = localStorage.getItem('game_rating_device_id');
    if (!deviceId) {
        deviceId = 'device_' + Math.random().toString(36).substr(2, 16) + '_' + Date.now();
        localStorage.setItem('game_rating_device_id', deviceId);
    }
    return deviceId;
}

const deviceId = getDeviceId();

const headers = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY
};

// Fetch all ratings and check which games this device has rated
async function fetchRatings() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ratings?select=gameFolder,fun,creativity,difficulty,polish,device_id`, { headers });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        
        ratingsCache = {};
        userRatedGames.clear();
        
        data.forEach(r => {
            // Track which games THIS DEVICE has already rated
            if (r.device_id === deviceId) {
                userRatedGames.add(r.gameFolder);
            }
            
            // Calculate average ratings for display
            if (!ratingsCache[r.gameFolder]) ratingsCache[r.gameFolder] = [];
            ratingsCache[r.gameFolder].push({
                avg: (r.fun + r.creativity + r.difficulty + r.polish) / 4
            });
        });
        
        console.log('Your Device ID:', deviceId);
        console.log('Games you have rated:', Array.from(userRatedGames));
    } catch(e) {
        console.error('Fetch error:', e);
    }
}

function getAverageRating(folder) {
    if (!ratingsCache[folder] || ratingsCache[folder].length === 0) return null;
    const sum = ratingsCache[folder].reduce((acc, r) => acc + r.avg, 0);
    return (sum / ratingsCache[folder].length).toFixed(1);
}

function getRatingCount(folder) {
    return ratingsCache[folder]?.length || 0;
}

function hasUserRatedThisGame(folder) {
    return userRatedGames.has(folder);
}

async function displayGames() {
    await fetchRatings();
    const grid = document.getElementById('gameGrid');
    document.getElementById('gameCount').textContent = games.length;
    
    grid.innerHTML = games.map((game, idx) => {
        const avg = getAverageRating(game.folder);
        const count = getRatingCount(game.folder);
        const stars = avg ? '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg)) : '';
        const alreadyRated = hasUserRatedThisGame(game.folder);
        
        return `
        <div class="col">
            <div class="card game-card">
                <div class="card-body text-center">
                    <img src="${game.folder}/index.png" 
                         class="game-icon"
                         onerror="this.src='https://via.placeholder.com/120x120?text=No+Image'; this.onerror=null;">
                    <h6 class="card-title fw-bold mt-2">${game.name}</h6>
                    <div class="folder-path mb-2">${game.folder}/</div>
                    ${avg ? `<div class="avg-display">${stars} ${avg} (${count} ratings)</div>` : '<div class="avg-display text-muted">Be the first to rate!</div>'}
                    ${alreadyRated ? '<div class="rated-badge">✓ You already rated this</div>' : ''}
                    <a href="${game.github}" class="btn btn-sm btn-outline-primary w-100 mt-2" target="_blank">▶ Play</a>
                    <button class="btn btn-sm ${alreadyRated ? 'btn-secondary' : 'btn-outline-success'} w-100 mt-2" 
                            onclick="openRatingModal(${idx})"
                            ${alreadyRated ? 'disabled' : ''}>
                        ${alreadyRated ? '✓ Rated' : '⭐ Rate This Game'}
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function openRatingModal(idx) {
    const game = games[idx];
    
    // Double check they haven't already rated this game
    if (hasUserRatedThisGame(game.folder)) {
        showToast('You have already rated this game on this computer!', 'error');
        return;
    }
    
    activeGame = game;
    currentRatings = {};
    document.getElementById('modalGameName').textContent = activeGame.name;
    document.getElementById('commentBox').value = '';
    
    // Create star ratings
    ['fun', 'creativity', 'difficulty', 'polish'].forEach(category => {
        const container = document.querySelector(`.star-rating[data-category="${category}"]`);
        if (!container) return;
        container.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
            const star = document.createElement('span');
            star.className = 'star';
            star.textContent = '☆';
            star.onclick = () => setStar(category, i);
            container.appendChild(star);
        }
    });
    
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('ratingModal').classList.add('active');
}

function setStar(category, value) {
    currentRatings[category] = value;
    const container = document.querySelector(`.star-rating[data-category="${category}"]`);
    const stars = container.querySelectorAll('.star');
    stars.forEach((star, i) => {
        if (i < value) {
            star.textContent = '★';
            star.classList.add('active');
        } else {
            star.textContent = '☆';
            star.classList.remove('active');
        }
    });
    
    const allRated = ['fun', 'creativity', 'difficulty', 'polish'].every(c => currentRatings[c] > 0);
    document.getElementById('submitBtn').disabled = !allRated;
}

function closeModal() {
    document.getElementById('ratingModal').classList.remove('active');
    activeGame = null;
}

async function submitRating() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';
    
    const payload = {
        gameFolder: activeGame.folder,
        gameName: activeGame.name,
        fun: currentRatings.fun,
        creativity: currentRatings.creativity,
        difficulty: currentRatings.difficulty,
        polish: currentRatings.polish,
        comment: document.getElementById('commentBox').value || null,
        device_id: deviceId  // This prevents rating the same game again
    };
    
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ratings`, {
            method: 'POST',
            headers: { ...headers, 'Prefer': 'return=minimal' },
            body: JSON.stringify(payload)
        });
        
        if (res.ok) {
            closeModal();
            showToast(`✓ You rated ${activeGame.name}! You cannot rate it again.`, 'success');
            userRatedGames.add(activeGame.folder); // Update local tracking
            await displayGames(); // Refresh the grid
        } else {
            const errorText = await res.text();
            console.error('Submit error:', errorText);
            showToast(`❌ Failed to save rating. ${errorText.substring(0, 100)}`, 'error');
            btn.textContent = 'Try Again';
            btn.disabled = false;
        }
    } catch(e) {
        showToast(`❌ Error: ${e.message}`, 'error');
        btn.textContent = 'Try Again';
        btn.disabled = false;
    }
}

function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.backgroundColor = type === 'error' ? '#dc3545' : '#198754';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
}

document.getElementById('ratingModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
});

// Start the app
displayGames();
setInterval(displayGames, 30000);
</script>
</body>
</html>
