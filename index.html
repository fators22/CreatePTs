<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create PT AP SHOW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            padding: 2rem 0;
        }
        .game-card {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            text-decoration: none;
            color: #212529;
            height: 100%;
            border: 1px solid #dee2e6;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #0d6efd;
        }
        .card-icon {
            text-align: center;
            margin: 1rem 0;
        }
        .card-icon img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            border-radius: 8px;
        }
        .folder-path {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #6c757d;
            background: #f8f9fa;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
        }
        .rating-box {
            background: #e9ecef;
            border-left: 4px solid #0d6efd;
            margin-bottom: 2rem;
        }
        .footer {
            margin-top: 3rem;
            padding: 1.5rem 0;
            background: white;
            border-top: 1px solid #dee2e6;
            color: #6c757d;
        }
        .game-count-badge {
            background: #0d6efd;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="alert rating-box d-flex align-items-center justify-content-between">
        <div>
            <strong>Rate Honestly:</strong> After playing each game, click the button to submit your feedback.
        </div>
        <a href="https://forms.gle/45XNnFP8vguNWmQM9" class="btn btn-primary btn-sm" target="_blank">Open Rating Form</a>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="text-secondary">Submitted Games</h5>
        <span class="game-count-badge" id="gameCount">0</span>
    </div>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="gameGrid">
        <div class="col">
            <div class="alert alert-info text-center">Loading games...</div>
        </div>
    </div>
</div>
<div class="footer text-center mt-5">
    <div class="container">
        <p class="mb-0">Play - Rate - Be kind - Thank you</p>
    </div>
</div>
<script>
let gameFolders = [
    { name: "Dolphin Pop",       folder: "DolphinPop",       github: "https://clajoo27.github.io/Dolphin-Pop/?authuser=0",                   rated: false },
    { name: "Car Race",          folder: "CarRace",          github: "https://tyler-bergman.github.io/Final-Project/?authuser=0",            rated: false },
    { name: "BasketBall Game",   folder: "Basketball",       github: "https://yurihan08.github.io/BasketballGame/",                          rated: false },
    { name: "Maze Run",          folder: "MazeGame",         github: "https://serenego127.github.io/mazeRun/?authuser=0",                    rated: false },
    { name: "Human Benchmark",   folder: "HumanBenchmark",   github: "https://thejeo27.github.io/HumanBenchmark/?authuser=0",                rated: false },
    { name: "Doodle Jump",       folder: "DoodleJump",       github: "https://george123-cloud.github.io/DoodleJump/?authuser=0",             rated: false },
    { name: "Cannon BBall",      folder: "CannonBall",       github: "https://jalen-hall.github.io/CannonBBALL/",                           rated: false },
    { name: "Ravenous Randy",    folder: "RavenousRandy",    github: "https://shinwin124.github.io/GameForCompSci/?authuser=0",              rated: false },
    { name: "Super Striker",     folder: "SuperStriker",     github: "https://miguelyangel515-svg.github.io/Super-Striker-game/?authuser=0", rated: false },
    { name: "Marathon Race",     folder: "MarathonRace",     github: "https://nickyawesome821.github.io/Marathon-game/?authuser=0",          rated: false },
    { name: "Brick Game",        folder: "BrickGame",        github: "https://deabiba1.github.io/spacegame/?authuser=0",                    rated: true  },
    { name: "Block Break",       folder: "BlockBreak",       github: "https://amir-suckra.github.io/BlockBreak/?authuser=0",                rated: true  },
    { name: "PokeBerry Catcher", folder: "PokeBerryCatcher", github: "https://timisverycool-ui.github.io/BerryCatcher/?authuser=0",          rated: true  },
    { name: "Jelly Fish",        folder: "JellyFish",        github: "https://sallyrubin724.github.io/SpongebobGame/?authuser=0",           rated: true  },
    { name: "Music Notes",       folder: "MusicNotes",       github: "https://nicholasrozenblit-wq.github.io/siteReading/?authuser=0",      rated: true  },
    { name: "Zombie Run",        folder: "ZombieRun",        github: "https://jacyag125.github.io/Zombie-Run/?authuser=0",                  rated: true  },
    { name: "Charging Chaos",    folder: "ChargingChaos",    github: "https://gurvinder1027.github.io/ChargerChaos/",                       rated: true  },
    { name: "Yahtzee",           folder: "Yahtzee",          github: "https://gianna-lobue.github.io/Yahtzee-/?authuser=0",                 rated: true  },
    { name: "Surfing Game",      folder: "SurfingGame",      github: "https://dylanjhub.github.io/Surf-Rider/?authuser=0",                  rated: true  },
    { name: "Santa Game",        folder: "SantaGame",        github: "https://jamgil27-glitch.github.io/Santa-Game/?authuser=0",            rated: true  },
    { name: "Mewtwo Survival",   folder: "MewtwoSurvival",   github: "https://andrewhockey65-pixel.github.io/MewtwoSurvival/?authuser=0",   rated: true  }
];

function displayGames() {
    const gridContainer = document.getElementById('gameGrid');
    const gameCountSpan = document.getElementById('gameCount');

    if (gameFolders.length === 0) {
        gridContainer.innerHTML = `
            <div class="col-12">
                <div class="alert alert-warning text-center">No games found.</div>
            </div>`;
        gameCountSpan.textContent = '0';
        return;
    }

    gameCountSpan.textContent = gameFolders.length;
    let html = '';

    for (let i = 0; i < gameFolders.length; i++) {
        const game      = gameFolders[i];
        const gameUrl   = game.github ? game.github : game.folder + '/index.html';
        const cardStyle = game.rated
            ? 'background-color: #d1e7dd; border-color: #198754;'
            : 'background-color: #f8d7da; border-color: #dc3545;';

        html += `
        <div class="col">
            <a href="${escapeHtml(gameUrl)}" class="game-card card h-100 text-decoration-none" target="_blank" style="${cardStyle}">
                <div class="card-body text-center">
                    <div class="card-icon">
                        <img src="${game.folder}/index.png"
                             onerror="this.src='${game.folder}/index.gif'; this.onerror=null;">
                    </div>
                    <h6 class="card-title fw-bold text-dark mb-2">${escapeHtml(game.name)}</h6>
                    <div class="folder-path">${escapeHtml(game.folder)}/</div>
                </div>
            </a>
        </div>`;
    }

    gridContainer.innerHTML = html;
}

function escapeHtml(str) {
    return str.replace(/[&<>"']/g, function(m) {
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m];
    });
}

displayGames();
</script>
</body>
</html>
